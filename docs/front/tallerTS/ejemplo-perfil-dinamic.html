<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil Estudiante — Dinámico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background-color: #f0f0f0;
    }

    .avatar-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background-color: #ece8e2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-circle i {
      font-size: 100px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="mb-3 text-end">
      <a href="../taller-typescript.html" class="text-secondary small me-3">Ir al taller &rarr;</a>
      <a href="../example-typescript.html" class="text-secondary small">Ver explicación técnica &rarr;</a>
    </div>
    <div class="bg-white border rounded p-4">
      <div class="row g-4 align-items-start">

        <!-- Columna izquierda: nombre, avatar, datos personales -->
        <div class="col-12 col-md-5">

          <!-- El nombre se insertará aquí desde JavaScript -->
          <h1 id="student-name" class="fw-bold mb-4"></h1>

          <!-- Avatar -->
          <div class="d-flex justify-content-center mb-4">
            <div class="avatar-circle">
              <i class="bi bi-person-fill"></i>
            </div>
          </div>

          <!-- Datos Personales — las filas se insertan desde JavaScript -->
          <div class="border rounded p-3">
            <p class="fw-bold mb-2">Datos Personales</p>
            <hr class="mt-1 mb-0" />
            <table class="table table-borderless table-sm mb-0">
              <tbody id="datos-tbody">
                <!-- populated by JavaScript -->
              </tbody>
            </table>
          </div>

        </div>

        <!-- Columna derecha: cursos actuales -->
        <div class="col-12 col-md-7">

          <div class="border rounded p-3">
            <p class="fw-bold mb-3">Cursos Actuales</p>
            <table class="table mb-0">
              <thead class="table-dark">
                <tr>
                  <th>Curso</th>
                  <th>Profesor</th>
                </tr>
              </thead>
              <tbody id="courses-tbody">
                <!-- populated by JavaScript -->
              </tbody>
            </table>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!--
    type="module" gives this script its own scope and defers execution
    until the DOM is ready — no need for DOMContentLoaded.

    Course, Person and loadPerson live in src/person.ts (TypeScript source)
    and src/person.js (compiled ES module imported below).
  -->
  <script type="module">

    import { loadPerson } from './src/person.js';

    // ── Render ─────────────────────────────────────────────────────────────

    function renderPerson(person) {
      // Name
      document.getElementById('student-name').textContent = person.name;

      // Personal data rows
      const datosTbody = document.getElementById('datos-tbody');
      datosTbody.innerHTML =
        row('Código',    person.code)            +
        row('Cédula',    person.idNumber)         +
        row('Edad',      person.age + ' Años')    +
        row('Dirección', person.address)           +
        row('Teléfono',  person.phone);

      // Course rows
      const coursesTbody = document.getElementById('courses-tbody');
      coursesTbody.innerHTML = person.courses
        .map(c => courseRow(c.name, c.professor))
        .join('');
    }

    // ── HTML helpers ───────────────────────────────────────────────────────

    function row(label, value) {
      return '<tr class="border-top">' +
               '<td class="text-secondary" style="width:40%;">' + label + '</td>' +
               '<td>' + value + '</td>' +
             '</tr>';
    }

    function courseRow(name, professor) {
      return '<tr>' +
               '<td class="text-secondary">' + name      + '</td>' +
               '<td class="text-secondary">' + professor + '</td>' +
             '</tr>';
    }

    // ── Boot ───────────────────────────────────────────────────────────────

    loadPerson('data/student.json')
      .then(person => {
        console.log('=== Person loaded ===');
        console.log(person);
        renderPerson(person);
      })
      .catch(err => {
        console.error('Error loading student data:', err.message);
      });

  </script>

</body>
</html>
